<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>myTask</title>
    <meta name="description" content="Easy Task Manager" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./theme1.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <ion-icon id="menu-icon" name="menu-outline"></ion-icon>
      <h1>myTask</h1>
      <ion-icon id="account-icon" name="person-outline"></ion-icon>
    </header>
    <main>
      <div class="calendar-wrapper">
        <div class="calendar-container">
          <div class="calendar-track">
            <!-- days will be generated with JS -->
          </div>
        </div>
        <div id="calendar-expand">
          <h4>
            <a href="#" id="openCalendarBtn">Open Calendar</a>
          </h4>
          <div id="calendarModal" class="calendar-modal">
            <div class="calendar-content">
              <div class="calendar-header">
                <button id="prevMonth">◀</button>
                <h3 id="monthYear"></h3>
                <button id="nextMonth">▶</button>
              </div>
              <div class="calendar-days" id="calendarDays"></div>
              <div class="calendar-buttons-div">
                <button id="selectDayBtn" class="comment-button">Select</button>
                <button id="closeCalendarBtn" class="comment-button">
                  Close
                </button>
              </div>
            </div>
          </div>
          <span class="material-symbols-outlined"> calendar_month </span>
        </div>
      </div>
      <form id="taskForm">
        <div>
          <textarea id="taskInput" rows="1" required></textarea>
          <button id="submitButton" type="submit">
            <span class="material-symbols-outlined"> add </span>
          </button>
        </div>
        <div>
          <button id="timeScheduleButton" type="button">
            Toggle time schedule
          </button>
        </div>
      </form>
      <section id="taskList"></section>
    </main>
    <footer></footer>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
    <script src="script.js" async defer></script>
  </body>
</html>
